services:
  - type: web
    name: greenguard-webhook
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webhook_server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CALCOM_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: ADMIN_SMS_NUMBER
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CALENDAR_TIMEZONE
        value: America/Chicago

  - type: worker
    name: greenguard-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: starter
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
      - key: CALCOM_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: ADMIN_SMS_NUMBER
        sync: false
      - key: POLL_INTERVAL_SECONDS
        value: 60
      - key: CALENDAR_TIMEZONE
        value: America/Chicago
      - key: PROCESSED_LABEL
        value: Greenguard-Processed
      - key: DEPOT_ADDRESS
        value: 1519 Parkway Austin TX 78703
